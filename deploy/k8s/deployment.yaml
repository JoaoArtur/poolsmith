apiVersion: apps/v1
kind: Deployment
metadata:
  name: poolsmith
  namespace: poolsmith
  labels:
    app.kubernetes.io/name: poolsmith
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: poolsmith
  template:
    metadata:
      labels:
        app.kubernetes.io/name: poolsmith
      annotations:
        # Force a rollout whenever either config or userlist change.
        checksum/config: "REPLACE_ME_ON_APPLY"
        checksum/userlist: "REPLACE_ME_ON_APPLY"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: poolsmith
          image: ghcr.io/joaoartur/poolsmith:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-config"
            - "/etc/poolsmith/poolsmith.ini"
            - "-log-level"
            - "info"
          ports:
            - name: pg
              containerPort: 6432
              protocol: TCP
          env:
            # Keep Go's GOMAXPROCS in sync with the CPU limit (see
            # https://github.com/uber-go/automaxprocs — manual here).
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: "1"
            - name: GOMEMLIMIT
              value: "900MiB"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/poolsmith/poolsmith.ini
              subPath: poolsmith.ini
              readOnly: true
            - name: userlist
              mountPath: /etc/poolsmith/userlist.txt
              subPath: userlist.txt
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: poolsmith-config
        - name: userlist
          secret:
            secretName: poolsmith-userlist
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: poolsmith
