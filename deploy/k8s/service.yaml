apiVersion: v1
kind: Service
metadata:
  name: poolsmith
  namespace: poolsmith
  labels:
    app.kubernetes.io/name: poolsmith
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: poolsmith
  ports:
    - name: pg
      port: 5432       # expose on the canonical Postgres port so apps connect
      targetPort: 6432 # to poolsmith transparently
      protocol: TCP
  # Prefer zone-local endpoints to keep pooler traffic on the same node/az
  # when possible. Comment out if your cluster doesn't support it.
  internalTrafficPolicy: Cluster
  sessionAffinity: None
