apiVersion: v1
kind: ConfigMap
metadata:
  name: poolsmith-config
  namespace: poolsmith
data:
  poolsmith.ini: |
    [poolsmith]
    listen_addr = 0.0.0.0
    listen_port = 6432

    auth_type = md5
    auth_file = /etc/poolsmith/userlist.txt

    pool_mode           = transaction
    default_pool_size   = 20
    reserve_pool_size   = 5
    min_pool_size       = 0
    max_client_conn     = 2000

    server_idle_timeout    = 600
    server_lifetime        = 3600
    server_connect_timeout = 15
    query_wait_timeout     = 120
    client_login_timeout   = 60

    admin_users = postgres, poolsmith_admin

    server_tls_sslmode = prefer

    [servers]
    primary  = host=postgres.db.svc.cluster.local port=5432 role=primary
    replica1 = host=postgres-replica.db.svc.cluster.local port=5432 role=replica

    [databases]
    app = server=primary replicas=replica1 dbname=app_prod pool_size=40
